version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    restart: always
    volumes:
      - nextcloud_data:/var/www/html

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

volumes:
  nextcloud_data:
  HNG-nginx-logs:
    name: HNG-nginx-logs
